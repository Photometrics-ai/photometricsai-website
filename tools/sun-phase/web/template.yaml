AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Sun Phase Tools - tools.photometrics.ai

Globals:
  Function:
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        DATA_BUCKET: !Ref DataBucket

Parameters:
  DomainName:
    Type: String
    Default: tools.photometrics.ai
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for tools.photometrics.ai (must be us-east-1 for CloudFront)

Resources:
  # ─── S3 Buckets ───
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: AutoCleanup
            Status: Enabled
            ExpirationInDays: 3
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "https://tools.photometrics.ai"
            AllowedMethods:
              - PUT
              - GET
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3600

  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 30

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ─── Lambda Layer ───
  DepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: sun-phase-deps
      Description: pandas, pytz, timezonefinder, shared code
      ContentUri: layers/deps/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ─── API Gateway ───
  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      EndpointConfiguration:
        Type: REGIONAL
      BinaryMediaTypes:
        - "text/csv"
        - "application/octet-stream"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 100
          ThrottlingBurstLimit: 50

  # ─── Lambda Functions ───
  TwilightApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/twilight_api/
      Handler: handler.lambda_handler
      MemorySize: 512
      Timeout: 30
      Layers:
        - !Ref DepsLayer
      Events:
        GetTwilight:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/twilight
            Method: GET

  UploadInitiatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/upload_initiator/
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 10
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        PostUpload:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase/upload
            Method: POST

  DetectColumnsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/detect_columns/
      Handler: handler.lambda_handler
      MemorySize: 256
      Timeout: 10
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
      Events:
        PostDetect:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase/detect-columns
            Method: POST

  StartProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/start_processing/
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 10
      Layers:
        - !Ref DepsLayer
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref PhaseProcessorStateMachine
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt PhaseProcessorStateMachine.Name
      Events:
        PostStart:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase/start
            Method: POST

  SplitterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/splitter/
      Handler: handler.lambda_handler
      MemorySize: 3008
      Timeout: 900
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket

  ChunkProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/chunk_processor/
      Handler: handler.lambda_handler
      MemorySize: 2048
      Timeout: 900
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket

  CombinerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/combiner/
      Handler: handler.lambda_handler
      MemorySize: 3008
      Timeout: 900
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket

  StatusApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/status_api/
      Handler: handler.lambda_handler
      MemorySize: 128
      Timeout: 10
      Layers:
        - !Ref DepsLayer
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase/status
            Method: GET

  # ─── Synchronous Phase API ───
  PhaseApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/phase_api/
      Handler: handler.lambda_handler
      MemorySize: 512
      Timeout: 30
      Layers:
        - !Ref DepsLayer
      Events:
        PostPhase:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase
            Method: POST

  PhaseCsvApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/phase_csv_api/
      Handler: handler.lambda_handler
      MemorySize: 512
      Timeout: 30
      Layers:
        - !Ref DepsLayer
      Events:
        PostPhaseCsv:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /api/phase/csv
            Method: POST

  # ─── Step Functions ───
  PhaseProcessorStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: statemachine/phase_processor.asl.json
      DefinitionSubstitutions:
        SplitterFunctionArn: !GetAtt SplitterFunction.Arn
        ChunkProcessorFunctionArn: !GetAtt ChunkProcessorFunction.Arn
        CombinerFunctionArn: !GetAtt CombinerFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref SplitterFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref ChunkProcessorFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref CombinerFunction

  # ─── CloudFront ───
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Logging:
          Bucket: !GetAtt LogBucket.DomainName
          IncludeCookies: false
          Prefix: cloudfront/
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiGateway
            DomainName: !Sub "${Api}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /prod
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiGateway
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            Compress: true

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FrontendBucketName:
    Description: Frontend S3 bucket name
    Value: !Ref FrontendBucket
  DataBucketName:
    Description: Data S3 bucket name
    Value: !Ref DataBucket
  CloudFrontDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  LogBucketName:
    Description: Access log bucket name
    Value: !Ref LogBucket
