customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains'
      - key: X-Content-Type-Options
        value: nosniff
      - key: X-Frame-Options
        value: SAMEORIGIN
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=()'
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://d3js.org https://glyphex.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://*.s3.us-east-2.amazonaws.com https://www.googletagmanager.com https://glyphex.io; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
  - pattern: '/css/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '/images/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '/videos/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '/fonts/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: /press/birdcast-integration.pdf
    headers:
      - key: Content-Disposition
        value: 'attachment; filename="Photometrics-AI-BirdCast-Integration-Feb-2026.pdf"'
