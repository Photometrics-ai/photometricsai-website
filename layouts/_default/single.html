{{ define "main" }}
<div class="page-header" data-theme="dark">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="lead">{{ . }}</p>{{ end }}
    {{ with .Params.lastmod }}<p class="last-updated" style="font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem;">Last updated: {{ time.Format "January 2006" . }}</p>{{ end }}
  </div>
</div>

<div class="page-content" data-theme="light">
  <div class="container">
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</div>

{{ partial "cta.html" . }}
{{ end }}
